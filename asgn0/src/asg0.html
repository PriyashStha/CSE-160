<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <title>Draw a blue rectangle (canvas version)</title>
    </head>

    <body onload="main()">

        <p>
            Name: Priyash Shrestha<br>
            UCSC Email: pshrest5@ucsc.edu<br>
            Notes to Grader: N/A
        </p>

        <canvas id="example" width="400" height="400">
        Please use a browser that supports "canvas"
        </canvas>

        <div>
            <label for="v1x">v1 x:</label>
            <input type="number" id="v1x" value="2.25" step="0.1">
            
            <label for="v1y">v1 y:</label>
            <input type="number" id="v1y" value="2.25" step="0.1">
            
            <button id="drawV1">Draw Vector</button>
        </div>

        <div>
            <label for="v2x">v2 x:</label>
            <input type="number" id="v2x" value="1.5" step="0.1">
            
            <label for="v2y">v2 y:</label>
            <input type="number" id="v2y" value="1.5" step="0.1">
        </div>

        <div>
            <label for="operation">Operation:</label>
            <select id="operation">
                <option value="add">Add</option>
                <option value="sub">Subtract</option>
                <option value="mul">Multiply</option>
                <option value="div">Divide</option>
                <option value="magnitude">Magnitude</option>
                <option value="normalize">Normalize</option>
                <option value="angle">Angle between</option>
                <option value="area">Area</option>
            </select>
            
            <label for="scalar">Scalar:</label>
            <input type="number" id="scalar" value="1" step="0.1">
            
            <button id="drawOperation">Draw Operation</button>
        </div>

        <script src="lib/cuon-matrix-cse160.js"></script>
        <script src="asg0.js"></script>
    </body>
</html>
